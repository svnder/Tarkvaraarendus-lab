services:
  gateway:
    build: ./microservices/gateway
    ports:
      - "5070:5000"
    container_name: epood-gateway
    depends_on:
      - users
      - products
      - orders
      - reviews

  users:
    build: ./microservices/users
    ports:
      - "5051:5001"
    container_name: epood-users

  products:
    build: ./microservices/products
    ports:
      - "5052:5002"
    container_name: epood-products

  orders:
    build: ./microservices/orders
    ports:
      - "5053:5003"
    container_name: epood-orders
    depends_on:
      - users
      - products

  reviews:
    build: ./microservices/reviews
    ports:
      - "5054:5004"
    container_name: epood-reviews
    depends_on:
      - users
      - products
